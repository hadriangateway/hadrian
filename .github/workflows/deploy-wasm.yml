name: Deploy WASM App

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "ui/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build-wasm.sh"
      - ".github/workflows/deploy-wasm.yml"
  workflow_dispatch:

concurrency:
  group: deploy-wasm
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack@0.13.1 --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-wasm-${{ hashFiles('ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-wasm-

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Generate API client
        working-directory: ui
        run: pnpm run generate-api

      - name: Build WASM module
        run: ./scripts/build-wasm.sh --release

      # Cloudflare Pages rejects any file >25 MiB, and the vendored DuckDB wasm
      # bundles (mvp ~37 MiB, eh ~33 MiB) exceed that. For the public Pages demo
      # only, load DuckDB from jsDelivr instead of self-hosting it. Self-hosted
      # deployments keep the same-origin vendored copies (the default base URL).
      # The version is read from the lockfile-resolved install so it never drifts.
      - name: Point DuckDB at jsDelivr (Pages 25 MiB per-file limit)
        working-directory: ui
        run: |
          # Read the installed version straight from the file; the package's
          # `exports` map doesn't expose ./package.json to `require`.
          DUCKDB_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('node_modules/@duckdb/duckdb-wasm/package.json','utf8')).version)")
          echo "VITE_DUCKDB_BASE_URL=https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@${DUCKDB_VERSION}/dist/" >> "$GITHUB_ENV"

      - name: Build frontend (WASM mode)
        working-directory: ui
        run: pnpm build
        env:
          VITE_WASM_MODE: "true"
          VITE_DUCKDB_BASE_URL: ${{ env.VITE_DUCKDB_BASE_URL }}

      # Drop the vendored DuckDB wasm now that the app loads it from jsDelivr;
      # otherwise wrangler aborts on the >25 MiB files even though they're unused.
      - name: Drop vendored DuckDB wasm from the bundle
        run: rm -rf ui/dist/wasm/duckdb

      - name: Add headers for service worker
        run: |
          cat > ui/dist/_headers <<'EOF'
          /sw.js
            Service-Worker-Allowed: /
            Cache-Control: no-cache, no-store, must-revalidate
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ui/dist --project-name=hadrian
