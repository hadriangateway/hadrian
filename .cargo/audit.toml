[advisories]
ignore = [
    # rand 0.8.5 unsoundness only triggers when a custom `log` implementation calls
    # `rand::rng()` during trace-level logging. Hadrian uses `tracing-subscriber`, not a
    # custom `log::Log` implementation, so the affected code path is unreachable. rand
    # 0.8.5 is pulled in transitively via augurs, sqlx-postgres, and oauth2.
    "RUSTSEC-2026-0097",
    # rsa 0.9.10 Marvin Attack (timing sidechannel). No fix available. Transitive
    # dependency via sqlx-mysql — Hadrian doesn't use RSA keys for MySQL auth.
    "RUSTSEC-2023-0071",
    # hickory-proto 0.25.2 NSEC3 unbounded loop and O(n²) name-compression DoS.
    # Pulled in only by microsandbox-network (the `runtime-microsandbox` feature,
    # off in every default profile) for in-microVM DNS resolution behind the
    # sandbox egress allowlist. microsandbox 0.4.5 pins the hickory 0.25.x line
    # (see the dependency comment in Cargo.toml); a fixed 0.26.x requires a
    # microsandbox bump. Hadrian's own resolver uses hickory-resolver 0.26.1.
    "RUSTSEC-2026-0118",
    "RUSTSEC-2026-0119",
    # quick-xml < 0.41 DoS: quadratic duplicate-attribute check (0194) and unbounded
    # namespace-declaration allocation in NsReader (0195). Both fixed only in 0.41.0
    # (published 2026-06-29); no dependent has released a 0.41 bump yet:
    #   - 0.37.5 via samael ^0.37.2 (latest 0.0.21, git master unchanged) — SAML SSO
    #   - 0.39.2 via calamine ^0.39 (latest 0.35.0) — xberg excel extraction
    #   - 0.40.1 via xberg/pdf_oxide/office_oxide ^0.40 (all latest) — xberg office/pdf
    # DoS only (CPU/memory exhaustion), no memory unsafety or code execution. SAML and
    # document extraction do parse untrusted XML, so drop these ignores as soon as
    # upstream releases pick up quick-xml 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
