# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Advisories - check for known security vulnerabilities
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# How to handle unmaintained crates: all, workspace, transitive, none
unmaintained = "none"
yanked = "warn"
# Known issues we're tracking but can't fix yet
ignore = [
    # rand 0.8.5 unsoundness requires a custom `log::Log` implementation that calls
    # `rand::rng()` during trace-level logging. Hadrian uses `tracing-subscriber`, so the
    # affected code path is unreachable. Pulled in transitively via augurs, sqlx, and oauth2.
    { id = "RUSTSEC-2026-0097", reason = "unreachable: hadrian has no custom log::Log impl that invokes rand::rng()" },
    # hickory-proto 0.25.2 NSEC3 closest-encloser unbounded loop. Pulled in only by
    # microsandbox-network (the `runtime-microsandbox` feature) for in-microVM DNS
    # resolution behind the sandbox egress allowlist. The vulnerable DnssecDnsHandle
    # only compiles with the `dnssec-ring`/`dnssec-aws-lc-rs` features, which
    # microsandbox-network does not enable, so the path is not built. No safe upgrade
    # exists for 0.25.x; a fix requires a microsandbox bump (0.4.6 pins an
    # incompatible hickory line — see the dependency comment in Cargo.toml). Hadrian's
    # own resolver uses hickory-resolver 0.26.1. Mirrors .cargo/audit.toml.
    { id = "RUSTSEC-2026-0118", reason = "unreachable: dnssec features not enabled on microsandbox-network's hickory-client; no 0.25.x fix" },
    # hickory-proto 0.25.2 O(n²) name-compression CPU exhaustion. Same provenance as
    # RUSTSEC-2026-0118: microsandbox-network's in-microVM DNS behind the egress
    # allowlist. Fixed in hickory-proto 0.26.1, which microsandbox 0.4.5 cannot adopt.
    # Mirrors .cargo/audit.toml.
    { id = "RUSTSEC-2026-0119", reason = "limited reach: microsandbox-network in-microVM DNS only; no 0.25.x fix until microsandbox bump" },
    # quick-xml < 0.41 quadratic duplicate-attribute check. Fixed only in quick-xml
    # 0.41.0 (2026-06-29); every dependent still pins an older series: samael ^0.37.2
    # (SAML SSO), calamine ^0.39 and xberg/pdf_oxide/office_oxide ^0.40 (document
    # extraction). All are at their latest releases, so no upgrade path exists yet.
    # DoS only (CPU exhaustion). Drop when upstream bumps land. Mirrors .cargo/audit.toml.
    { id = "RUSTSEC-2026-0194", reason = "no fixed upstream releases: samael/calamine/xberg all pin pre-0.41 quick-xml; DoS only" },
    # quick-xml < 0.41 unbounded namespace-declaration allocation in NsReader. Same
    # provenance and status as RUSTSEC-2026-0194. Mirrors .cargo/audit.toml.
    { id = "RUSTSEC-2026-0195", reason = "no fixed upstream releases: samael/calamine/xberg all pin pre-0.41 quick-xml; DoS only" },
]

# Licenses - ensure all dependencies use acceptable licenses
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    "bzip2-1.0.6",
    "CDLA-Permissive-2.0",
]


[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# Bans - prevent certain crates or duplicate versions
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Specific crate bans
deny = []

# Allow specific duplicates that are hard to avoid
skip = []
skip-tree = []

# Sources - ensure crates come from trusted sources
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
